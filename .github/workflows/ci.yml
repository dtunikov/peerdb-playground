name: CI

on:
  push:
    branches: ["**"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.26.1"

jobs:
  generate:
    name: Generate Protobuf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: buf generate

      - name: Create exports.go
        run: |
          cat > gen/exports.go << 'EOF'
          package gen

          // CdcFlowConfigSourceConfig re-exports the generated oneof interface so other
          // packages can accept any valid CdcFlowConfig source_config wrapper.
          type CdcFlowConfigSourceConfig = isCdcFlowConfig_SourceConfig
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: gen/
          retention-days: 1

  lint:
    name: Lint
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        run: buf lint

      - name: Buf breaking change detection
        if: github.ref != 'refs/heads/main'
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main"

  test:
    name: Test
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Install Temporal CLI
        uses: temporalio/setup-temporal@v0
        with:
          version: latest

      - name: Run tests
        run: go test -count=1 -timeout 10m ./...

  build-images:
    name: Build & Push ${{ matrix.target }}
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [api, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.target }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: TARGET=${{ matrix.target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
