services:
  peerdb-postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      DB: postgres12_pgx
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: peerdb-postgres
    depends_on:
      peerdb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 5s
      timeout: 5s
      retries: 24

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  api:
    profiles: ["api"]
    build:
      context: .
    command: ["-mode=api"]
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      POSTGRES_URL: postgres://postgres:postgres@peerdb-postgres:5432/peerdb?sslmode=disable
      TEMPORAL_HOST_PORT: temporal:7233
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
    depends_on:
      peerdb-postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy

  worker:
    profiles: ["worker"]
    build:
      context: .
    command: ["-mode=worker"]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      POSTGRES_URL: postgres://postgres:postgres@peerdb-postgres:5432/peerdb?sslmode=disable
      TEMPORAL_HOST_PORT: temporal:7233
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
    depends_on:
      peerdb-postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy

volumes:
  pgdata:
