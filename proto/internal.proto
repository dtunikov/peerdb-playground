syntax = "proto3";

package peerdb;

enum QType {
  Q_TYPE_UNSPECIFIED = 0;
  Q_TYPE_BOOL = 1;
  Q_TYPE_INT16 = 2;
  Q_TYPE_INT32 = 3;
  Q_TYPE_INT64 = 4;
  Q_TYPE_FLOAT32 = 5;
  Q_TYPE_FLOAT64 = 6;
  Q_TYPE_STRING = 7;
  Q_TYPE_BYTES = 8;
  Q_TYPE_DATE = 9;
  Q_TYPE_TIME = 10;
  Q_TYPE_TIMESTAMP = 11;
  Q_TYPE_TIMESTAMPTZ = 12;
  Q_TYPE_UUID = 13;
  Q_TYPE_JSON = 14;
  Q_TYPE_NUMERIC = 15;
  Q_TYPE_ENUM = 16;
}

message ColumnSchema {
  string name = 1;
  QType type = 2;
  bool nullable = 3;
  bool primary_key = 4;
  // for numeric types
  int32 precision = 5;
  int32 scale = 6;
  repeated string enum_values = 7;
}

message TableSchema {
  string schema = 1;
  string name = 2;
  repeated ColumnSchema columns = 3;
}
