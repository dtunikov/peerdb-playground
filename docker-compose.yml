services:
  peerdb-postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerdb
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  pg-source:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: source
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10"]
    volumes:
      - pg_source_data:/var/lib/postgresql/data

  ch-dest:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "9000:9000"
      - "8123:8123"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: destination
    volumes:
      - ch_dest_data:/var/lib/clickhouse

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      DB: postgres12_pgx
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: peerdb-postgres
    depends_on:
      - peerdb-postgres

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

volumes:
  pgdata:
  pg_source_data:
  ch_dest_data:
